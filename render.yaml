services:
  - type: web
    name: ethan-dapp-server
    runtime: bun
    buildCommand: bun install && bun run build
    startCommand: bun run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET_KEY
        sync: false
      # Webhook relay target per destination (e.g. destination "discord").
      - key: WEBHOOK_DISCORD_URL
        sync: false
